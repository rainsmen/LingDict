name: Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties with SDK and API keys
      run: |
        cat << EOF > local.properties
        sdk.dir=$ANDROID_HOME
        YOUDAO_APP_KEY=${{ secrets.YOUDAO_APP_KEY }}
        YOUDAO_APP_SECRET=${{ secrets.YOUDAO_APP_SECRET }}
        PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
        EOF

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Sign Release APK
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks
        BUILD_TOOLS_VERSION=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)
        "$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner" sign \
          --ks release-keystore.jks \
          --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
          --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
          --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-installable
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/app-release-signed.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-signed.apk
        body: |
          ## LingDict APK Release

          ### 下载说明
          - `app-debug.apk`: 调试版本（已签名，可安装）
          - `app-release-signed.apk`: 发布版本（已签名，可安装）

          ### 功能特性
          - 50,000词ECDICT词库
          - SM-2智能复习算法
          - 4种测试题型
          - 完整学习统计
          - TTS语音播放
          - 图片助记功能

          ### 技术栈
          - Clean Architecture + MVVM
          - Jetpack Compose + Material 3
          - 92% test coverage
          - Zero known bugs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
