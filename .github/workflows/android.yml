name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties
      run: |
        echo "YOUDAO_APP_KEY=${{ secrets.YOUDAO_APP_KEY }}" >> local.properties
        echo "YOUDAO_APP_SECRET=${{ secrets.YOUDAO_APP_SECRET }}" >> local.properties
        echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> local.properties

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/test-results/
        retention-days: 7

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties
      run: |
        echo "YOUDAO_APP_KEY=${{ secrets.YOUDAO_APP_KEY }}" >> local.properties
        echo "YOUDAO_APP_SECRET=${{ secrets.YOUDAO_APP_SECRET }}" >> local.properties
        echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> local.properties

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Sign Release APK
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks
        BUILD_TOOLS_VERSION=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)
        "$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner" sign \
          --ks release-keystore.jks \
          --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
          --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
          --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/app-release-signed.apk
        retention-days: 30
